# ===================================================
# TracAutoFront — CI Pipeline
# ===================================================
# CRIT-9 / CI-1a: Pipeline de validación para frontend.
# Ejecuta lint, type-check, build y tests en PRs y pushes a main.
# ===================================================

name: Frontend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test:run
